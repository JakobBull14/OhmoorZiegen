<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Schulziegen – Quiz</title>
<link rel="stylesheet" href="/OhmoorZiegen/style.css">
</head>
<body>

<div id="nav-root"></div>

<main class="app-main">
  <div class="page-title">🧠 Ziegen-Quiz</div>
  <div class="quiz-wrap" id="quiz-body"></div>
</main>

<script src="/OhmoorZiegen/data.js"></script>
<script src="/OhmoorZiegen/nav.js"></script>
<script>
buildNav('quiz');

const NAME_BLACKLIST = [
  'idiot', 'idiotin', 'dumm', 'doof', 'blöd', 'stupid',
  'arsch', 'scheisse', 'scheiße', 'fuck', 'fick', 'porno',
  'sex', 'hurensohn', 'bitch', 'nazi', 'hitler'
];

function validatePlayerName(n) {
  const name = (n || '').trim().replace(/\s+/g, ' ');

  if (name.length < 2) {
    return { ok: false, error: 'Bitte gib mindestens 2 Zeichen ein.' };
  }
  if (name.length > 20) {
    return { ok: false, error: 'Bitte verwende höchstens 20 Zeichen.' };
  }
  if (/^\d+$/.test(name)) {
    return { ok: false, error: 'Bitte verwende nicht nur Zahlen.' };
  }

  const lower = name.toLowerCase();
  if (NAME_BLACKLIST.some(word => lower.includes(word))) {
    return { ok: false, error: 'Dieser Name ist hier nicht erlaubt. Bitte wähle einen anderen Namen.' };
  }

  return { ok: true, name };
}

function askForPlayerName() {
  let validName = null;

  while (!validName) {
    const input = prompt(
`Wähle deinen Spielernamen

Gib den Namen ein, unter dem dich andere an der Schule erkennen (z. B. dein Vorname).
Wenn Du die App schon auf einem anderen Gerät benutzt, verwende bitte hier den selben Namen.
Sollte dein Name schon vergeben sein, füge eine Zahl oder deine Klasse hinzu (z. B. 6B).
Bitte keine Fantasienamen oder unangemessenen Namen – solche Namen können gelöscht werden.`,
      getDisplayName() || ''
    );

    if (!input) continue;

    const valid = validatePlayerName(input);
    if (valid.ok) {
      validName = valid.name;
    } else {
      alert(valid.error);
    }
  }

  setDisplayName(validName);
  localStorage.setItem('goat_name_confirmed', '1');
}

function ensureConfirmedPlayerName() {
  const confirmed = localStorage.getItem('goat_name_confirmed') === '1';
  if (!confirmed) {
    askForPlayerName();
  }
}


let quizQuestions = [];
async function loadQuizFromApi() {
  try {
    const res = await fetch('https://ziegen-api.torstenbull.workers.dev/api/quiz');
    const data = await res.json();

    // API → Format deiner App
    quizQuestions = data.map(q => ({
      q: q.question,
      a: [q.option_a, q.option_b, q.option_c, q.option_d],
      c: ['A','B','C','D'].indexOf(q.correct_option),
      e: '🐐'
    }));

    startQuiz();
  } catch (e) {
    document.getElementById('quiz-body').innerHTML =
      '<div style="padding:20px">Fehler beim Laden des Quiz 😢</div>';
    console.error(e);
  }
}
let quizState = null;

function startQuiz() {
  const qs = [...quizQuestions]
    .sort(() => Math.random() - .5)
    .slice(0, Math.min(7, quizQuestions.length));
  quizState = { idx: 0, score: 0, questions: qs, answered: false };
  renderQuiz();
}

function renderQuiz() {
  const { idx, score, questions } = quizState;
  const qb = document.getElementById('quiz-body');

  if (idx >= questions.length) {
    const pct = Math.round(score / questions.length * 100);
    const em  = pct >= 80 ? '🏆' : pct >= 50 ? '😊' : '🐐';
    const msg = pct >= 80 ? 'Ziegenexperte!' : pct >= 50 ? 'Gut gemacht!' : 'Übe weiter!';
    qb.innerHTML = `
      <div class="quiz-score">
        <span class="quiz-score-emoji">${em}</span>
        <div class="quiz-score-number">${score} / ${questions.length}</div>
        <div class="quiz-score-msg">${msg}</div>
        <button class="btn-primary" style="margin:20px auto 0;display:block" onclick="startQuiz()">
          Nochmal spielen
        </button>
      </div>`;
    return;
  }

  const q = questions[idx];
  qb.innerHTML = `
    <div class="quiz-progress">
      <div class="quiz-progress-bar" style="width:${idx / questions.length * 100}%"></div>
    </div>
    <div class="quiz-meta">Frage ${idx + 1} von ${questions.length}</div>
    <span class="quiz-emoji">${q.e}</span>
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-options">
      ${q.a.map((a, i) => `
        <button class="quiz-option" id="qo${i}" onclick="answerQ(${i})">${a}</button>
      `).join('')}
    </div>
    <div id="q-fb"></div>`;
}

function answerQ(ch) {
  if (quizState.answered) return;
  quizState.answered = true;
  const q  = quizState.questions[quizState.idx];
  const ok = q.c === ch;
  if (ok) quizState.score++;

  document.querySelectorAll('.quiz-option').forEach((b, i) => {
    b.disabled = true;
    if (i === q.c)       b.classList.add('correct');
    else if (i === ch && !ok) b.classList.add('wrong');
  });

  document.getElementById('q-fb').innerHTML = `
    <div class="quiz-feedback ${ok ? 'correct' : 'wrong'}">
      ${ok ? '✓ Richtig!' : `✗ Falsch. Richtig war: <strong>${q.a[q.c]}</strong>`}
    </div>
    <button class="btn-primary" style="margin-top:14px" onclick="nextQ()">
      ${quizState.idx + 1 < quizState.questions.length ? 'Weiter →' : 'Ergebnis anzeigen'}
    </button>`;
}

function nextQ() {
  quizState.idx++;
  quizState.answered = false;
  renderQuiz();
}

ensureConfirmedPlayerName();
loadQuizFromApi();
</script>
</body>
</html>
