<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Schulziegen – Alle Ziegen</title>
<link rel="stylesheet" href="/OhmoorZiegen/style.css">
</head>
<body>

<div id="nav-root"></div>

<main class="app-main">

  <!-- Hero-Bar -->
  <div class="hero-bar">
    <div class="hero-bar-text">
      <h1>Unsere Schulziegen 🐐</h1>
      <p>Lerne alle 9 Ziegen unserer Schule kennen!</p>
    </div>
    <span class="hero-bar-emoji">🌿</span>
  </div>

  <div id="player-count" style="margin:10px 0 6px 0;font-size:14px;color:var(--clr-text-muted)"></div>

  <!-- Suchfeld (Mobil) -->
  <div style="position:relative;margin-bottom:16px">
    <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--clr-text-faint);font-size:16px;pointer-events:none">🔍</span>
    <input type="text" id="srch"
           style="width:100%;padding:10px 14px 10px 38px;border:1px solid var(--clr-border);border-radius:var(--radius-full);background:var(--clr-card);color:var(--clr-text);font-family:var(--font-body);font-size:14px;outline:none"
           placeholder="Ziege suchen …" oninput="onSearch()" autocomplete="off">
  </div>

  <div class="gallery-meta" id="gal-meta"></div>
  <div class="gallery-grid" id="gal-grid"></div>
  <div class="hidden" id="no-res" style="text-align:center;padding:60px 20px">
    <div style="font-size:48px;margin-bottom:12px">🔍</div>
    <div style="font-size:15px;color:var(--clr-text-muted)">Keine Ziege gefunden</div>
  </div>

</main>

<script src="/OhmoorZiegen/data.js"></script>
<script src="/OhmoorZiegen/nav.js"></script>
<script>
buildNav('gallery');

let goats = [];
let filtered = [];

async function loadPlayerCount() {
  try {
    const lb = await fetchLeaderboard();
    const names = new Set();
    (lb || []).forEach(entry => {
      if (entry && entry.player_name) {
        names.add(String(entry.player_name).trim().toLowerCase());
      }
    });

    const el = document.getElementById('player-count');
    if (!el) return;

    const count = names.size || 0;
    el.innerHTML = `👥 <strong>${count}</strong> Spieler machen schon mit`;
  } catch (e) {
    console.warn('Spielerzahl konnte nicht geladen werden.', e);
  }
}

async function initPage() {
  try {
    goats = await getGoatsFromApi();
  } catch (e) {
    console.error('API-Laden fehlgeschlagen, nutze lokalen Fallback.', e);
    goats = getGoats();
  }

  try {
    const rawVoteResults = await fetchVoteResults();
    const voteMap = {};

    if (Array.isArray(rawVoteResults)) {
      rawVoteResults.forEach(item => {
        const goatId = Number(item.goat_id ?? item.id ?? item.goatId);
        const votes = Number(item.votes ?? item.vote_count ?? item.count ?? 0);
        if (goatId) voteMap[goatId] = votes;
      });
    } else if (rawVoteResults && typeof rawVoteResults === 'object') {
      const list = Array.isArray(rawVoteResults.results) ? rawVoteResults.results : null;

      if (list) {
        list.forEach(item => {
          const goatId = Number(item.goat_id ?? item.id ?? item.goatId);
          const votes = Number(item.votes ?? item.vote_count ?? item.count ?? 0);
          if (goatId) voteMap[goatId] = votes;
        });
      } else {
        Object.entries(rawVoteResults).forEach(([key, value]) => {
          const goatId = Number(key);
          const votes = Number(value?.votes ?? value?.vote_count ?? value ?? 0);
          if (goatId) voteMap[goatId] = votes;
        });
      }
    }

    goats = goats.map(g => ({ ...g, votes: voteMap[g.id] || 0 }));
  } catch (e) {
    console.warn('Vote-Ergebnisse konnten nicht geladen werden.', e);
  }

  filtered = [...goats];
  renderGallery();
  await loadPlayerCount();
}

function onSearch() {
  const q = document.getElementById('srch').value.toLowerCase().trim();
  filtered = q
    ? goats.filter(g =>
        g.name.toLowerCase().includes(q) ||
        g.nick.toLowerCase().includes(q) ||
        g.character.toLowerCase().includes(q))
    : [...goats];
  renderGallery();
}

function renderGallery() {
  const grid = document.getElementById('gal-grid');
  const nr   = document.getElementById('no-res');
  const meta = document.getElementById('gal-meta');

  if (!filtered.length) {
    grid.innerHTML = '';
    nr.classList.remove('hidden');
    meta.textContent = '';
    return;
  }
  nr.classList.add('hidden');
  meta.textContent = filtered.length === goats.length
    ? `${goats.length} Ziegen`
    : `${filtered.length} von ${goats.length} Ziegen`;

  const goatsWithVotes = goats
    .filter(g => Number(g.votes || 0) > 0)
    .sort((a, b) => Number(b.votes || 0) - Number(a.votes || 0));

  const showRanking = goatsWithVotes.length >= 3;
  const topIds = showRanking ? goatsWithVotes.slice(0, 3).map(g => g.id) : [];

  function getRankIcon(goatId) {
    const pos = topIds.indexOf(goatId);
    if (pos === 0) return '🥇 ';
    if (pos === 1) return '🥈 ';
    if (pos === 2) return '🥉 ';
    return '';
  }

  grid.innerHTML = filtered.map(g => {
    const ph = (g.photos && g.photos.length)
      ? `<img src="${g.photos[0]}" alt="${g.name}" loading="lazy">`
      : g.foto
        ? `<img src="${g.foto}" alt="${g.name}" loading="lazy" onerror="this.parentNode.querySelector('.fb-emoji').style.display='block';this.style.display='none'"><span class="fb-emoji" style="display:none;font-size:3.5rem">${g.e}</span>`
        : `<span style="font-size:3.5rem">${g.e}</span>`;

    const cnt = g.photos && g.photos.length > 1
      ? `<div class="gc-photo-count">📷 ${g.photos.length}</div>` : '';

    const rankIcon = showRanking ? getRankIcon(g.id) : '';
    const vt = `<div class="gc-badge">${rankIcon}❤️ ${Number(g.votes || 0)}</div>`;

    return `<a class="goat-card" href="/OhmoorZiegen/ziege.html?id=${g.id}" style="text-decoration:none">
      <div class="goat-card-image">${ph}${vt}</div>
      <div class="goat-card-body">
        <div class="goat-card-name">${g.name}</div>
        <div class="goat-card-nick">${g.nick}</div>
        <div class="goat-card-chips">
          <span class="chip">🎂 ${g.age}</span>
          ${g.mother ? `<span class="chip chip-blue">↑ ${g.mother}</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
}

initPage();
</script>
</body>
</html>
