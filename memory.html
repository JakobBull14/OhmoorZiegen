      <button class="btn-primary" onclick="saveName()">Speichern</button>

<script>
buildNav('memory');

let goats = [];

async function loadGoats() {
  goats = await getGoatsFromApi();
}
let memState = null;
let cfg = getMemConfig();

const NAME_BLACKLIST = [
  'idiot', 'idiotin', 'dumm', 'doof', 'blöd', 'stupid',
  'arsch', 'scheisse', 'scheiße', 'fuck', 'fick', 'porno',
  'sex', 'hurensohn', 'bitch', 'nazi', 'hitler'
];

function validatePlayerName(n) {
  const name = (n || '').trim().replace(/\s+/g, ' ');

  if (name.length < 2) {
    return { ok: false, error: 'Bitte gib mindestens 2 Zeichen ein.' };
  }

  if (name.length > 20) {
    return { ok: false, error: 'Bitte verwende höchstens 20 Zeichen.' };
  }

  if (/^\d+$/.test(name)) {
    return { ok: false, error: 'Bitte verwende nicht nur Zahlen.' };
  }

  const lower = name.toLowerCase();
  if (NAME_BLACKLIST.some(word => lower.includes(word))) {
    return { ok: false, error: 'Dieser Name ist hier nicht erlaubt. Bitte wähle einen anderen Namen.' };
  }

  return { ok: true, name };
}


// Spieler-Name anzeigen
function showName() {
  document.getElementById('name-display').textContent = getDisplayName();
}

function askForPlayerName() {
  openNameModal();
}

  showName();
}

function ensureConfirmedPlayerName() {
  const confirmed = localStorage.getItem('goat_name_confirmed') === '1';
  if (!confirmed) {
    askForPlayerName();
  }
}

function changeName() {
  openNameModal(true);
}

  localStorage.setItem('goat_name_confirmed', '1');
  showName();
}

function startMemory() {
  cfg = getMemConfig();
  const pairs = Math.min(cfg.pairs, goats.length);

  document.getElementById('mem-controls').innerHTML = `
    <span class="memory-stat">Paare: <strong>${pairs}</strong></span>
    <span class="memory-stat" id="mem-moves">Züge: <strong>0</strong></span>
    <span class="memory-stat" id="mem-found">Gefunden: <strong>0</strong>/${pairs}</span>
    <button class="btn-primary" onclick="startMemory()">↺ Neu starten</button>`;

  initMemory(pairs);
}

function initMemory(pairs) {
  const selectedGoats = [...goats].sort(() => Math.random() - .5).slice(0, pairs);
  let cards = [];
  selectedGoats.forEach((g, i) => {
    cards.push({ id: i * 2,     goatId: g.id, pairId: i });
    cards.push({ id: i * 2 + 1, goatId: g.id, pairId: i });
  });
  cards = cards.sort(() => Math.random() - .5);
  memState = { cards, flipped: [], matched: [], moves: 0, locked: false, pairs };
  updateMemStats();
  renderMemBoard();
}

function renderMemBoard() {
  const board = document.getElementById('mem-board');
  const cols  = memState.pairs <= 6 ? 4 : 6;
  board.style.gridTemplateColumns = `repeat(${cols},1fr)`;

  board.innerHTML = memState.cards.map((c, idx) => {
    const g = goats.find(g => g.id === c.goatId);
    const front = (g.photos && g.photos.length)
      ? `<img src="${g.photos[0]}" alt="${g.name}"><div class="card-label">${g.name}</div>`
      : g.foto
        ? `<img src="${g.foto}" alt="${g.name}" onerror="this.style.display='none';this.nextSibling.style.display='block'"><span class="card-emoji" style="display:none">${g.e}</span><div class="card-label">${g.name}</div>`
        : `<span class="card-emoji">${g.e}</span><div class="card-label">${g.name}</div>`;
    return `
      <div class="memory-card-wrap" onclick="flipCard(${idx})">
        <div class="memory-card" id="mc${idx}">
          <div class="card-face card-back">🐐</div>
          <div class="card-face card-front">${front}</div>
        </div>
      </div>`;
  }).join('');
}

function flipCard(idx) {
  const s = memState;
  if (s.locked) return;
  if (s.flipped.includes(idx)) return;
  if (s.matched.includes(s.cards[idx].pairId)) return;

  s.flipped.push(idx);
  document.getElementById('mc' + idx).classList.add('flipped');

  if (s.flipped.length === 2) {
    s.moves++; s.locked = true;
    updateMemStats();
    const [a, b] = s.flipped;

    if (s.cards[a].pairId === s.cards[b].pairId) {
      s.matched.push(s.cards[a].pairId);
      document.getElementById('mc' + a).classList.add('matched');
      document.getElementById('mc' + b).classList.add('matched');
      s.flipped = []; s.locked = false;
      updateMemStats();
      if (s.matched.length === s.pairs) setTimeout(gameWon, 400);
    } else {
      setTimeout(() => {
        document.getElementById('mc' + a).classList.remove('flipped');
        document.getElementById('mc' + b).classList.remove('flipped');
        s.flipped = []; s.locked = false;
      }, 900);
    }
  }
}

function updateMemStats() {
  const el  = document.getElementById('mem-moves');
  const el2 = document.getElementById('mem-found');
  if (el)  el.innerHTML  = `Züge: <strong>${memState.moves}</strong>`;
  if (el2) el2.innerHTML = `Gefunden: <strong>${memState.matched.length}</strong>/${memState.pairs}`;
}

async function gameWon() {
  const name = getDisplayName();
  let saveMessage = 'Ergebnis wurde in der Rangliste gespeichert!';
  let saveColor = 'var(--clr-blue)';
  try {
    await saveScore(name, memState.moves, memState.pairs);
  } catch (err) {
    saveMessage = 'Speichern in der Rangliste fehlgeschlagen.';
    saveColor = 'var(--clr-text-muted)';
  }

  document.getElementById('mem-board').innerHTML = `
    <div style="grid-column:1/-1;text-align:center;padding:40px 16px">
      <div style="font-size:60px;margin-bottom:14px">🏆</div>
      <div style="font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--clr-text);margin-bottom:8px">
        Gewonnen, ${name}!
      </div>
      <div style="font-size:15px;color:var(--clr-text-muted);margin-bottom:4px">
        ${memState.moves} Züge · ${memState.pairs} Paare
      </div>
      <div style="font-size:13px;color:${saveColor};font-weight:500;margin-bottom:22px">
        ${saveMessage}
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn-primary" onclick="startMemory()">Nochmal spielen</button>
        <a class="btn-secondary" href="/OhmoorZiegen/rangliste.html">Rangliste ansehen</a>
      </div>
    </div>`;
}

showName();

(async () => {
  ensureConfirmedPlayerName();
  await loadGoats();
  startMemory();
})();
