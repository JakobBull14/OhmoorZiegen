<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Schulziegen – Fakten</title>
<link rel="stylesheet" href="/OhmoorZiegen/style.css">
</head>
<body>

<div id="nav-root"></div>

<main class="app-main">
  <div class="page-title">💡 Wissenswertes über Ziegen</div>
  <div class="facts-grid" id="facts-body"></div>
</main>

<script src="/OhmoorZiegen/data.js"></script>
<script src="/OhmoorZiegen/nav.js"></script>
<script>
buildNav('fakten');

let FACTS = [];

function renderFacts() {
  const body = document.getElementById('facts-body');

  if (!FACTS.length) {
    body.innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">💡</span>
        <div class="empty-state-text">Noch keine Fakten vorhanden</div>
      </div>`;
    return;
  }

  body.innerHTML = FACTS.map(f => `
    <div class="fact-card">
      <span class="fact-icon">${escHtml(f.icon || '')}</span>
      <div class="fact-title">${escHtml(f.title || '')}</div>
      <div class="fact-text">${escHtml(f.content || '')}</div>
    </div>`).join('');
}

async function loadFacts() {
  try {
    const res = await fetch(API_BASE + '/api/facts', { cache: 'no-store' });
    if (!res.ok) throw new Error('Fakten konnten nicht geladen werden');
    FACTS = await res.json();
    renderFacts();
  } catch (e) {
    document.getElementById('facts-body').innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">⚠️</span>
        <div class="empty-state-text">Fakten konnten nicht geladen werden</div>
      </div>`;
  }
}

loadFacts();
</script>
</body>
</html>
