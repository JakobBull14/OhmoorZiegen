<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Schulziegen – Rangliste</title>
<link rel="stylesheet" href="/OhmoorZiegen/style.css">

<style>
.top3-title{
  margin: 0 0 12px 0;
  font-size: 20px;
  font-weight: 800;
}
.top3-podium{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:12px;
  margin: 0 0 20px 0;
  flex-wrap:nowrap;
}
.podium-card{
  flex:1;
  max-width:180px;
  min-width:0;
  border-radius:18px;
  padding:14px 12px;
  text-align:center;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  border:2px solid rgba(0,0,0,0.06);
  background:#fff;
}
.podium-card .podium-place{
  font-size:22px;
  font-weight:800;
  margin-bottom:6px;
}
.podium-card .podium-name{
  font-size:16px;
  font-weight:800;
  margin-bottom:6px;
  word-break:break-word;
}
.podium-card .podium-score{
  font-size:20px;
  font-weight:900;
  margin-bottom:4px;
}
.podium-card .podium-meta{
  font-size:12px;
  color:var(--clr-text-muted);
  line-height:1.4;
}
.podium-first{
  min-height:188px;
  padding-top:18px;
  padding-bottom:18px;
}
.podium-second,
.podium-third{
  min-height:164px;
}
@media (max-width: 700px){
  .top3-podium{
    gap:8px;
  }
  .podium-card{
    padding:12px 8px;
  }
  .podium-card .podium-name{
    font-size:14px;
  }
  .podium-card .podium-score{
    font-size:18px;
  }
}
</style>

</head>
<body>

<div id="nav-root"></div>

<main class="app-main">
  <div class="page-title">🏆 Rangliste – Memory</div>
  <p class="section-sub">Die besten Ergebnisse aller Spieler. Wenigste Züge gewinnt!</p>
  <div id="lb-body"></div>
</main>

<script src="/OhmoorZiegen/data.js"></script>
<script src="/OhmoorZiegen/nav.js"></script>
<script>
buildNav('rangliste');

let leaderboard = [];

async function loadLeaderboard() {
  const lb = document.getElementById('lb-body');
  lb.innerHTML = `<p style="font-size:14px;color:var(--clr-text-muted)">Lade Rangliste ...</p>`;
  try {
    leaderboard = await fetchLeaderboard();
    render();
  } catch (err) {
    lb.innerHTML = `<div class="empty-state"><span class="empty-state-icon">⚠️</span><div class="empty-state-text">Rangliste konnte nicht geladen werden</div><div class="empty-state-sub">${escHtml(err.message || 'Unbekannter Fehler')}</div></div>`;
  }
}


function formatPodiumDate(value) {
  if (!value) return '';
  return String(value).split(' ')[0].split('T')[0];
}

function buildPodiumCard(player, place, medal, extraClass, myName) {
  if (!player) return '';
  const isYou = player.player_name === myName;
  return `<div class="podium-card ${extraClass}${isYou ? ' lb-you' : ''}">
    <div class="podium-place">${medal} ${place}</div>
    <div class="podium-name">${escHtml(player.player_name)}${isYou ? ' <span style="font-size:11px">(Du)</span>' : ''}</div>
    <div class="podium-score">${player.score} Züge</div>
    <div class="podium-meta">${player.pairs ?? '-'} Paare</div>
    <div class="podium-meta">${escHtml(formatPodiumDate(player.date_label || player.created_at || ''))}</div>
  </div>`;
}

function render() {
  const myName = getDisplayName();
  const lb = document.getElementById('lb-body');

  if (!leaderboard.length) {
    lb.innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">🃏</span>
        <div class="empty-state-text">Noch keine Einträge</div>
        <div class="empty-state-sub">Spiele Memory und komm in die Rangliste!</div>
        <a href="/OhmoorZiegen/memory.html" class="btn-primary" style="margin-top:16px;display:inline-flex">Memory spielen</a>
      </div>`;
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  const topThree = leaderboard.slice(0, 3);

  lb.innerHTML = `
    <h2 class="top3-title">🏆 Beste Memory-Spieler</h2>
    <div class="top3-podium">
      ${buildPodiumCard(topThree[1], 2, '🥈', 'podium-second', myName)}
      ${buildPodiumCard(topThree[0], 1, '🥇', 'podium-first', myName)}
      ${buildPodiumCard(topThree[2], 3, '🥉', 'podium-third', myName)}
    </div>

    <table class="leaderboard-table">
      <thead>
        <tr>
          <th>#</th><th></th><th>Spieler</th><th>Züge</th><th>Paare</th><th>Datum</th>${isAdminLoggedIn() ? '<th></th>' : ''}
        </tr>
      </thead>
      <tbody>
        ${leaderboard.map((s, i) => {
          const isYou = s.player_name === myName;
          return `<tr class="${isYou ? 'lb-you' : ''}">
            <td class="lb-rank">${i + 1}</td>
            <td class="lb-medal">${medals[i] || ''}</td>
            <td>${escHtml(s.player_name)}${isYou ? ' <span style="font-size:11px">(Du)</span>' : ''}</td>
            <td class="lb-score">${s.score}</td>
            <td style="color:var(--clr-text-muted);font-size:12px">${s.pairs ?? '-'} Paare</td>
            <td class="lb-time">${escHtml(s.date_label || s.created_at || '')}</td>
            ${isAdminLoggedIn() ? `<td><button class="btn-danger" style="padding:4px 8px;font-size:11px" onclick="deleteEntry(${s.id})">Löschen</button></td>` : ''}
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    ${isAdminLoggedIn() ? `
      <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn-danger" onclick="doReset()">Rangliste leeren</button>
      </div>` : ''}`;
}

async function deleteEntry(id) {
  if (!confirm('Diesen Ranglisten-Eintrag wirklich löschen?')) return;
  try {
    await deleteLeaderboardEntry(id);
    await loadLeaderboard();
  } catch (err) {
    alert(err.message || 'Löschen fehlgeschlagen.');
  }
}

async function doReset() {
  if (!confirm('Rangliste wirklich leeren?')) return;
  try {
    await clearScores();
    await loadLeaderboard();
  } catch (err) {
    alert(err.message || 'Zurücksetzen fehlgeschlagen.');
  }
}

loadLeaderboard();
</script>
</body>
</html>
