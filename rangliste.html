<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Schulziegen – Ranglisten</title>
<link rel="stylesheet" href="/OhmoorZiegen/style.css">
<style>
.rank-hero{
  margin: 0 0 18px 0;
}
.rank-cards{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
  margin: 0 0 22px 0;
}
.rank-card{
  border-radius:20px;
  padding:16px;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  border:1px solid rgba(0,0,0,0.06);
  background:#fff;
}
.rank-card.memory{
  background:linear-gradient(180deg,#fff8e1 0%, #ffffff 100%);
  border-top:6px solid #d4af37;
}
.rank-card.quiz{
  background:linear-gradient(180deg,#eef2ff 0%, #ffffff 100%);
  border-top:6px solid #4f46e5;
}
.rank-card-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.rank-card-title{
  font-size:20px;
  font-weight:800;
  margin:0;
}
.rank-card-sub{
  font-size:13px;
  color:var(--clr-text-muted);
  margin:2px 0 0 0;
}
.top3-mini{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin:0 0 14px 0;
}
.top3-mini-item{
  text-align:center;
  border-radius:16px;
  padding:12px 8px;
  border:1px solid rgba(0,0,0,0.06);
  background:rgba(255,255,255,0.75);
}
.top3-mini-item.first{
  transform:translateY(-4px);
}
.top3-mini-medal{
  font-size:22px;
  margin-bottom:4px;
}
.top3-mini-name{
  font-size:14px;
  font-weight:800;
  line-height:1.2;
  word-break:break-word;
  margin-bottom:4px;
}
.top3-mini-score{
  font-size:14px;
  font-weight:800;
}
.top3-mini-meta{
  font-size:11px;
  color:var(--clr-text-muted);
  margin-top:2px;
}
.rank-section{
  margin: 0 0 24px 0;
}
.rank-section-title{
  margin:0 0 12px 0;
  font-size:20px;
  font-weight:800;
}
@media (max-width: 420px){
  .top3-mini-name{
    font-size:13px;
  }
  .top3-mini-score{
    font-size:13px;
  }
}

.lb-you{
  background:rgba(79,70,229,0.08);
}
.lb-you td{
  font-weight:700;
}


html[data-dark] .rank-card.memory{
  background:linear-gradient(180deg,#3a2f12 0%, #241d0f 100%);
  border:1px solid rgba(255,255,255,0.10);
}
html[data-dark] .rank-card.quiz{
  background:linear-gradient(180deg,#1d2246 0%, #15192f 100%);
  border:1px solid rgba(255,255,255,0.10);
}
html[data-dark] .rank-card-title,
html[data-dark] .top3-mini-name,
html[data-dark] .top3-mini-score{
  color:#f5f7fb;
}
html[data-dark] .top3-mini-item{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.10);
}
html[data-dark] .rank-card-sub,
html[data-dark] .top3-mini-meta{
  color:#d5dbe5;
}

</style>
</head>
<body>

<div id="nav-root"></div>

<main class="app-main">
  <div class="rank-hero">
    <div class="page-title">🏆 Ranglisten</div>
    <p class="section-sub">Vergleiche die besten Ergebnisse in Memory und Quiz.</p>
  </div>

  <div class="rank-cards">
    <section class="rank-card memory">
      <div class="rank-card-head">
        <div>
          <h2 class="rank-card-title">🃏 Memory</h2>
          <p class="rank-card-sub">Die besten Ergebnisse mit den wenigsten Zügen</p>
        </div>
      </div>
      <div id="memory-top3"></div>
      <button class="btn-primary" onclick="scrollToSection('memory-full')">Komplette Memory-Liste ansehen</button>
    </section>

    <section class="rank-card quiz">
      <div class="rank-card-head">
        <div>
          <h2 class="rank-card-title">🧠 Quiz</h2>
          <p class="rank-card-sub">Die besten Quizergebnisse nach richtigen Antworten</p>
        </div>
      </div>
      <div id="quiz-top3"></div>
      <button class="btn-primary" onclick="scrollToSection('quiz-full')">Komplette Quiz-Liste ansehen</button>
    </section>
  </div>

  <section id="memory-full" class="rank-section"></section>
  <section id="quiz-full" class="rank-section"></section>
  <button id="back-to-top" onclick="scrollToTop()" style="
    position:fixed;
    right:16px;
    bottom:20px;
    width:48px;
    height:48px;
    border:none;
    border-radius:999px;
    background:var(--clr-blue);
    color:#fff;
    font-size:20px;
    font-weight:800;
    box-shadow:0 8px 24px rgba(0,0,0,0.18);
    cursor:pointer;
    display:none;
    z-index:999;
  ">↑</button>

  <div id="admin-pw-modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px">
    <div style="width:min(360px,100%);border-radius:18px;padding:18px;background:var(--clr-card);border:1px solid var(--clr-border);box-shadow:0 18px 50px rgba(0,0,0,0.18)">
      <div style="font-size:18px;font-weight:800;margin-bottom:10px;color:var(--clr-text)">Admin-Passwort</div>
      <input id="admin-pw-modal-input" type="password" placeholder="Passwort eingeben" style="width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--clr-border);background:var(--clr-bg);color:var(--clr-text);box-sizing:border-box">
      <div id="admin-pw-modal-error" style="display:none;color:#b42318;font-size:12px;margin-top:8px"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px">
        <button class="btn-secondary" type="button" onclick="closeAdminPwModal()">Abbrechen</button>
        <button class="btn-primary" type="button" onclick="confirmAdminPwModal()">OK</button>
      </div>
    </div>
  </div>

</main>

<script src="/OhmoorZiegen/data.js"></script>
<script src="/OhmoorZiegen/nav.js"></script>
<script>
buildNav('rangliste');

let leaderboard = [];
let quizLeaderboard = [];

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function fetchQuizLeaderboard() {
  const res = await fetch(`${API_BASE}/api/quiz/leaderboard`, { cache: 'no-store' });
  if (!res.ok) throw new Error(`Quiz API ${res.status}`);
  return await res.json();
}

function formatRankingDate(value) {
  if (!value) return '';
  const d = new Date(String(value).replace(' ', 'T') + 'Z');
  if (Number.isNaN(d.getTime())) return String(value);
  return d.toLocaleDateString('de-DE', { day:'numeric', month:'numeric', year:'numeric' }) + ' ' +
    d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
}

function formatPodiumDate(value) {
  return formatRankingDate(value);
}

function renderMiniTop3(containerId, data, type) {
  const myName = getDisplayName();
  const el = document.getElementById(containerId);

  if (!data.length) {
    el.innerHTML = `<div class="empty-state" style="padding:10px 0 16px">
      <div class="empty-state-sub">Noch keine Einträge</div>
    </div>`;
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  const top = data.slice(0, 3);

  el.innerHTML = `<div class="top3-mini">
    ${top.map((p, i) => {
      const isYou = p.player_name === myName;
      const score = type === 'memory'
        ? `${p.score} Züge`
        : `${p.score}/${p.total}`;
      const meta = type === 'memory'
        ? `${p.pairs ?? '-'} Paare`
        : `${p.total ? Math.round((p.score / p.total) * 100) : 0}% richtig`;

      return `<div class="top3-mini-item ${i === 0 ? 'first' : ''}">
        <div class="top3-mini-medal">${medals[i]}</div>
        <div class="top3-mini-name">${escHtml(p.player_name)}${isYou ? ' <span style="font-size:11px">(Du)</span>' : ''}</div>
        <div class="top3-mini-score">${score}</div>
        <div class="top3-mini-meta">${meta}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderMemoryFull() {
  const myName = getDisplayName();
  const lb = document.getElementById('memory-full');

  if (!leaderboard.length) {
    lb.innerHTML = `
      <h2 class="rank-section-title">🃏 Memory – komplette Rangliste</h2>
      <div class="empty-state">
        <span class="empty-state-icon">🃏</span>
        <div class="empty-state-text">Noch keine Einträge</div>
        <div class="empty-state-sub">Spiele Memory und komm in die Rangliste!</div>
        <a href="/OhmoorZiegen/memory.html" class="btn-primary" style="margin-top:16px;display:inline-flex">Memory spielen</a>
      </div>`;
    return;
  }

  const medals = ['🥇','🥈','🥉'];

  lb.innerHTML = `
    <h2 class="rank-section-title">🃏 Memory – komplette Rangliste</h2>
    <table class="leaderboard-table">
      <thead>
        <tr>
          <th>#</th><th></th><th>Spieler</th><th>Züge</th><th>Paare</th><th>Datum</th>${isAdminLoggedIn() ? '<th></th>' : ''}
        </tr>
      </thead>
      <tbody>
        ${leaderboard.map((s, i) => {
          const isYou = s.player_name === myName;
          return `<tr class="${isYou ? 'lb-you' : ''}">
            <td class="lb-rank">${i + 1}</td>
            <td class="lb-medal">${medals[i] || ''}</td>
            <td>${escHtml(s.player_name)}${isYou ? ' <span style="font-size:11px;color:var(--clr-blue);font-weight:800">(Du)</span>' : ''}</td>
            <td class="lb-score">${s.score}</td>
            <td style="color:var(--clr-text-muted);font-size:12px">${s.pairs ?? '-'} Paare</td>
            <td class="lb-time">${escHtml(formatRankingDate(s.created_at || s.date_label || ''))}</td>
            ${isAdminLoggedIn() ? `<td><button class="btn-danger" style="padding:4px 8px;font-size:11px" onclick="deleteEntry(${s.id})">Löschen</button></td>` : ''}
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    ${isAdminLoggedIn() ? `
      <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn-danger" onclick="doReset()">Memory-Rangliste leeren</button>
      </div>` : ''}`;
}

function renderQuizFull() {
  const myName = getDisplayName();
  const lb = document.getElementById('quiz-full');

  if (!quizLeaderboard.length) {
    lb.innerHTML = `
      <h2 class="rank-section-title">🧠 Quiz – komplette Rangliste</h2>
      <div class="empty-state">
        <span class="empty-state-icon">🧠</span>
        <div class="empty-state-text">Noch keine Quiz-Einträge</div>
        <div class="empty-state-sub">Spiele das Quiz und komm in die Rangliste!</div>
        <a href="/OhmoorZiegen/quiz.html" class="btn-primary" style="margin-top:16px;display:inline-flex">Quiz spielen</a>
      </div>`;
    return;
  }

  const medals = ['🥇','🥈','🥉'];

  lb.innerHTML = `
    <h2 class="rank-section-title">🧠 Quiz – komplette Rangliste</h2>
    <table class="leaderboard-table">
      <thead>
        <tr>
          <th>#</th><th></th><th>Spieler</th><th>Punkte</th><th>Quote</th><th>Datum</th>${isAdminLoggedIn() ? '<th></th>' : ''}
        </tr>
      </thead>
      <tbody>
        ${quizLeaderboard.map((s, i) => {
          const isYou = s.player_name === myName;
          const percent = s.total ? Math.round((s.score / s.total) * 100) : 0;
          return `<tr class="${isYou ? 'lb-you' : ''}">
            <td class="lb-rank">${i + 1}</td>
            <td class="lb-medal">${medals[i] || ''}</td>
            <td>${escHtml(s.player_name)}${isYou ? ' <span style="font-size:11px;color:var(--clr-blue);font-weight:800">(Du)</span>' : ''}</td>
            <td class="lb-score">${s.score}/${s.total}</td>
            <td style="color:var(--clr-text-muted);font-size:12px">${percent}%</td>
            <td class="lb-time">${escHtml(formatRankingDate(s.created_at))}</td>
            ${isAdminLoggedIn() ? `<td><button class="btn-danger" style="padding:4px 8px;font-size:11px" onclick="deleteQuizEntry(${s.id})">Löschen</button></td>` : ''}
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}


let pendingAdminPwAction = null;

function askAdminPassword(action) {
  pendingAdminPwAction = action;
  const modal = document.getElementById('admin-pw-modal');
  const input = document.getElementById('admin-pw-modal-input');
  const error = document.getElementById('admin-pw-modal-error');
  if (!modal || !input || !error) return;
  input.value = '';
  error.style.display = 'none';
  error.textContent = '';
  modal.style.display = 'flex';
  setTimeout(() => input.focus(), 20);
}

function closeAdminPwModal() {
  const modal = document.getElementById('admin-pw-modal');
  if (modal) modal.style.display = 'none';
  pendingAdminPwAction = null;
}

async function confirmAdminPwModal() {
  const input = document.getElementById('admin-pw-modal-input');
  const error = document.getElementById('admin-pw-modal-error');
  const pw = input ? input.value : '';
  if (!pw) {
    if (error) {
      error.textContent = 'Bitte Passwort eingeben.';
      error.style.display = 'block';
    }
    return;
  }
  const action = pendingAdminPwAction;
  closeAdminPwModal();
  if (action) await action(pw);
}

async function deleteQuizEntry(id) {
  if (!confirm('Diesen Quiz-Eintrag wirklich löschen?')) return;

  askAdminPassword(async (adminPw) => {
    try {
      const res = await fetch(`${API_BASE}/api/admin/quiz/leaderboard/${id}`, {
        method: 'DELETE',
        headers: { 'X-Admin-Password': adminPw }
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `API ${res.status}`);

      await loadRankings();
    } catch (err) {
      alert(err.message || 'Löschen fehlgeschlagen.');
    }
  });
}

async function deleteEntry(id) {
  if (!confirm('Diesen Ranglisten-Eintrag wirklich löschen?')) return;

  askAdminPassword(async (adminPw) => {
    try {
      await deleteLeaderboardEntry(id, adminPw);
      await loadRankings();
    } catch (err) {
      alert(err.message || 'Löschen fehlgeschlagen.');
    }
  });
}

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleBackToTop() {
  const btn = document.getElementById('back-to-top');
  if (!btn) return;
  btn.style.display = window.scrollY > 220 ? 'block' : 'none';
}

window.addEventListener('scroll', toggleBackToTop);
window.addEventListener('load', toggleBackToTop);

async function doReset() {
  if (!confirm('Memory-Rangliste wirklich leeren?')) return;

  askAdminPassword(async (adminPw) => {
    try {
      await clearScores(adminPw);
      await loadRankings();
    } catch (err) {
      alert(err.message || 'Zurücksetzen fehlgeschlagen.');
    }
  });
}

async function loadRankings() {
  const memoryFull = document.getElementById('memory-full');
  const quizFull = document.getElementById('quiz-full');
  const memoryTop = document.getElementById('memory-top3');
  const quizTop = document.getElementById('quiz-top3');

  memoryTop.innerHTML = `<div style="font-size:13px;color:var(--clr-text-muted)">Lade ...</div>`;
  quizTop.innerHTML = `<div style="font-size:13px;color:var(--clr-text-muted)">Lade ...</div>`;
  memoryFull.innerHTML = `<p style="font-size:14px;color:var(--clr-text-muted)">Lade Memory-Rangliste ...</p>`;
  quizFull.innerHTML = `<p style="font-size:14px;color:var(--clr-text-muted)">Lade Quiz-Rangliste ...</p>`;

  try {
    leaderboard = await fetchLeaderboard();
  } catch (err) {
    leaderboard = [];
    memoryFull.innerHTML = `<div class="empty-state"><span class="empty-state-icon">⚠️</span><div class="empty-state-text">Memory-Rangliste konnte nicht geladen werden</div><div class="empty-state-sub">${escHtml(err.message || 'Unbekannter Fehler')}</div></div>`;
  }

  try {
    quizLeaderboard = await fetchQuizLeaderboard();
  } catch (err) {
    quizLeaderboard = [];
    quizFull.innerHTML = `<div class="empty-state"><span class="empty-state-icon">⚠️</span><div class="empty-state-text">Quiz-Rangliste konnte nicht geladen werden</div><div class="empty-state-sub">${escHtml(err.message || 'Unbekannter Fehler')}</div></div>`;
  }

  renderMiniTop3('memory-top3', leaderboard, 'memory');
  renderMiniTop3('quiz-top3', quizLeaderboard, 'quiz');
  renderMemoryFull();
  renderQuizFull();
}

loadRankings();
</script>
</body>
</html>
