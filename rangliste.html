<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Schulziegen – Ranglisten</title>
<link rel="stylesheet" href="/OhmoorZiegen/style.css">
</head>
<body>

<div id="nav-root"></div>

<main class="app-main">
  <div class="page-title">🏆 Ranglisten</div>
  <p class="section-sub">Vergleiche die besten Ergebnisse in Memory und Quiz.</p>
  <div class="rank-tabs">
    <button class="rank-tab active" id="tab-memory" onclick="showTab('memory')">🃏 Memory</button>
    <button class="rank-tab" id="tab-quiz" onclick="showTab('quiz')">🧠 Quiz</button>
  </div>

  <div id="memory-panel" class="rank-panel"></div>
  <div id="quiz-panel" class="rank-panel hidden"></div>
</main>

<script src="/OhmoorZiegen/data.js"></script>
<script src="/OhmoorZiegen/nav.js"></script>
<script>
buildNav('rangliste');


let leaderboard = [];
let quizLeaderboard = [];
let activeTab = 'memory';

async function fetchQuizLeaderboard() {
  const res = await fetch(`${API_BASE}/api/quiz/leaderboard`, { cache: 'no-store' });
  if (!res.ok) throw new Error(`Quiz API ${res.status}`);
  return await res.json();
}

function showTab(tab) {
  activeTab = tab;
  document.getElementById('tab-memory').classList.toggle('active', tab === 'memory');
  document.getElementById('tab-quiz').classList.toggle('active', tab === 'quiz');
  document.getElementById('memory-panel').classList.toggle('hidden', tab !== 'memory');
  document.getElementById('quiz-panel').classList.toggle('hidden', tab !== 'quiz');
}

async function loadLeaderboard() {
  const memoryPanel = document.getElementById('memory-panel');
  const quizPanel = document.getElementById('quiz-panel');

  memoryPanel.innerHTML = `<p style="font-size:14px;color:var(--clr-text-muted)">Lade Memory-Rangliste ...</p>`;
  quizPanel.innerHTML = `<p style="font-size:14px;color:var(--clr-text-muted)">Lade Quiz-Rangliste ...</p>`;

  try {
    leaderboard = await fetchLeaderboard();
  } catch (err) {
    memoryPanel.innerHTML = `<div class="empty-state"><span class="empty-state-icon">⚠️</span><div class="empty-state-text">Memory-Rangliste konnte nicht geladen werden</div><div class="empty-state-sub">${escHtml(err.message || 'Unbekannter Fehler')}</div></div>`;
  }

  try {
    quizLeaderboard = await fetchQuizLeaderboard();
  } catch (err) {
    quizPanel.innerHTML = `<div class="empty-state"><span class="empty-state-icon">⚠️</span><div class="empty-state-text">Quiz-Rangliste konnte nicht geladen werden</div><div class="empty-state-sub">${escHtml(err.message || 'Unbekannter Fehler')}</div></div>`;
  }

  renderMemory();
  renderQuiz();
  showTab(activeTab);
}

function formatPodiumDate(value) {
  if (!value) return '';
  return String(value).split(' ')[0].split('T')[0];
}

function buildPodiumCard(player, place, medal, extraClass, myName, scoreLabel, metaLabel) {
  if (!player) return '';
  const isYou = player.player_name === myName;

  const accent =
    place === 1 ? '#d4af37' :
    place === 2 ? '#c0c0c0' :
    '#cd7f32';

  const bg =
    place === 1 ? 'linear-gradient(180deg, #fff8e1 0%, #ffffff 100%)' :
    place === 2 ? 'linear-gradient(180deg, #f3f4f6 0%, #ffffff 100%)' :
    'linear-gradient(180deg, #fff1e8 0%, #ffffff 100%)';

  return `<div class="podium-card ${extraClass}${isYou ? ' lb-you' : ''}" style="border-top:6px solid ${accent}; background:${bg};">
    <div class="podium-place">${medal} ${place}</div>
    <div class="podium-name">${escHtml(player.player_name)}${isYou ? ' <span style="font-size:11px">(Du)</span>' : ''}</div>
    <div class="podium-score">${scoreLabel(player)}</div>
    <div class="podium-meta">${metaLabel(player)}</div>
    <div class="podium-meta">${escHtml(formatPodiumDate(player.date_label || player.created_at || ''))}</div>
  </div>`;
}

function renderMemory() {
  const myName = getDisplayName();
  const lb = document.getElementById('memory-panel');

  if (!leaderboard.length) {
    lb.innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">🃏</span>
        <div class="empty-state-text">Noch keine Einträge</div>
        <div class="empty-state-sub">Spiele Memory und komm in die Rangliste!</div>
        <a href="/OhmoorZiegen/memory.html" class="btn-primary" style="margin-top:16px;display:inline-flex">Memory spielen</a>
      </div>`;
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  const topThree = leaderboard.slice(0, 3);

  lb.innerHTML = `
    <h2 class="top3-title">🏆 Beste Memory-Spieler</h2>
    <div class="top3-podium">
      ${buildPodiumCard(topThree[1], 2, '🥈', 'podium-second', myName, p => `${p.score} Züge`, p => `${p.pairs ?? '-'} Paare`)}
      ${buildPodiumCard(topThree[0], 1, '🥇', 'podium-first', myName, p => `${p.score} Züge`, p => `${p.pairs ?? '-'} Paare`)}
      ${buildPodiumCard(topThree[2], 3, '🥉', 'podium-third', myName, p => `${p.score} Züge`, p => `${p.pairs ?? '-'} Paare`)}
    </div>

    <table class="leaderboard-table">
      <thead>
        <tr>
          <th>#</th><th></th><th>Spieler</th><th>Züge</th><th>Paare</th><th>Datum</th>${isAdminLoggedIn() ? '<th></th>' : ''}
        </tr>
      </thead>
      <tbody>
        ${leaderboard.map((s, i) => {
          const isYou = s.player_name === myName;
          return `<tr class="${isYou ? 'lb-you' : ''}">
            <td class="lb-rank">${i + 1}</td>
            <td class="lb-medal">${medals[i] || ''}</td>
            <td>${escHtml(s.player_name)}${isYou ? ' <span style="font-size:11px">(Du)</span>' : ''}</td>
            <td class="lb-score">${s.score}</td>
            <td style="color:var(--clr-text-muted);font-size:12px">${s.pairs ?? '-'} Paare</td>
            <td class="lb-time">${escHtml(s.date_label || s.created_at || '')}</td>
            ${isAdminLoggedIn() ? `<td><button class="btn-danger" style="padding:4px 8px;font-size:11px" onclick="deleteEntry(${s.id})">Löschen</button></td>` : ''}
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    ${isAdminLoggedIn() ? `
      <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn-danger" onclick="doReset()">Memory-Rangliste leeren</button>
      </div>` : ''}`;
}

function renderQuiz() {
  const myName = getDisplayName();
  const lb = document.getElementById('quiz-panel');

  if (!quizLeaderboard.length) {
    lb.innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">🧠</span>
        <div class="empty-state-text">Noch keine Quiz-Einträge</div>
        <div class="empty-state-sub">Spiele das Quiz und komm in die Rangliste!</div>
        <a href="/OhmoorZiegen/quiz.html" class="btn-primary" style="margin-top:16px;display:inline-flex">Quiz spielen</a>
      </div>`;
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  const topThree = quizLeaderboard.slice(0, 3);

  lb.innerHTML = `
    <h2 class="top3-title">🏆 Beste Quiz-Spieler</h2>
    <div class="top3-podium">
      ${buildPodiumCard(topThree[1], 2, '🥈', 'podium-second', myName, p => `${p.score}/${p.total}`, p => `${Math.round((p.score / p.total) * 100)}% richtig`)}
      ${buildPodiumCard(topThree[0], 1, '🥇', 'podium-first', myName, p => `${p.score}/${p.total}`, p => `${Math.round((p.score / p.total) * 100)}% richtig`)}
      ${buildPodiumCard(topThree[2], 3, '🥉', 'podium-third', myName, p => `${p.score}/${p.total}`, p => `${Math.round((p.score / p.total) * 100)}% richtig`)}
    </div>

    <table class="leaderboard-table">
      <thead>
        <tr>
          <th>#</th><th></th><th>Spieler</th><th>Punkte</th><th>Quote</th><th>Datum</th>
        </tr>
      </thead>
      <tbody>
        ${quizLeaderboard.map((s, i) => {
          const isYou = s.player_name === myName;
          const percent = s.total ? Math.round((s.score / s.total) * 100) : 0;
          return `<tr class="${isYou ? 'lb-you' : ''}">
            <td class="lb-rank">${i + 1}</td>
            <td class="lb-medal">${medals[i] || ''}</td>
            <td>${escHtml(s.player_name)}${isYou ? ' <span style="font-size:11px">(Du)</span>' : ''}</td>
            <td class="lb-score">${s.score}/${s.total}</td>
            <td style="color:var(--clr-text-muted);font-size:12px">${percent}%</td>
            <td class="lb-time">${escHtml(formatDateLabel(s.created_at) || s.created_at || '')}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

async function deleteEntry(id) {
  if (!confirm('Diesen Ranglisten-Eintrag wirklich löschen?')) return;

  const adminPw = prompt('Admin-Passwort eingeben:');
  if (!adminPw) return;

  try {
    await deleteLeaderboardEntry(id, adminPw);
    await loadLeaderboard();
  } catch (err) {
    alert(err.message || 'Löschen fehlgeschlagen.');
  }
}

async function doReset() {
  if (!confirm('Rangliste wirklich leeren?')) return;

  const adminPw = prompt('Admin-Passwort eingeben:');
  if (!adminPw) return;

  try {
    await clearScores(adminPw);
    await loadLeaderboard();
  } catch (err) {
    alert(err.message || 'Zurücksetzen fehlgeschlagen.');
  }
}

loadLeaderboard();
loadLeaderboard();
  } catch (err) {
    alert(err.message || 'Löschen fehlgeschlagen.');
  }
}

async function doReset() {
  if (!confirm('Rangliste wirklich leeren?')) return;
  try {
    await clearScores();
    await loadLeaderboard();
  } catch (err) {
    alert(err.message || 'Zurücksetzen fehlgeschlagen.');
  }
}

loadLeaderboard();
</script>
</body>
</html>
