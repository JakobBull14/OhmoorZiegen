<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Schulziegen – Ziege des Monats</title>
<link rel="stylesheet" href="/OhmoorZiegen/style.css">
</head>
<body>

<div id="nav-root"></div>

<main class="app-main">
  <div class="page-title">⭐ Ziege des Monats</div>
  <div id="gotm-body"></div>
</main>

<script src="/OhmoorZiegen/data.js"></script>
<script src="/OhmoorZiegen/nav.js"></script>
<script>
buildNav('monat');

let goats = [];
let voteResults = { total_votes: 0, counts: {} };

function buildWinnerCard(sorted, total) {
  const w = sorted[0];
  if (!w) {
    return `<p style="font-size:14px;color:var(--clr-text-muted)">Noch keine Ziegen gefunden.</p>`;
  }

  const wph = w.foto
    ? `<img src="${w.foto}" alt="${w.name}" onerror="this.style.display='none'">`
    : w.e;

  return `
    <div class="gotm-card">
      <div class="gotm-photo">${wph}</div>
      <div>
        <div class="gotm-label">Ziege des Monats</div>
        <div class="gotm-name">${w.name}</div>
        <div class="gotm-sub">${w.nick} · ${w.character}</div>
        <div class="gotm-votes">♥ ${w.votes} Stimmen${total > 0 ? ` · ${Math.round(w.votes / total * 100)}%` : ''}</div>
      </div>
    </div>`;
}

function render() {
  const body = document.getElementById('gotm-body');
  if (!goats.length) {
    body.innerHTML = `<p style="font-size:14px;color:var(--clr-text-muted)">Lade Abstimmung ...</p>`;
    return;
  }

  const voteMap = {};

  if (Array.isArray(voteResults)) {
    voteResults.forEach(item => {
      const goatId = Number(item.goat_id ?? item.id ?? item.goatId);
      const votes = Number(item.votes ?? item.vote_count ?? item.count ?? 0);
      if (goatId) voteMap[goatId] = votes;
    });
  } else if (voteResults && typeof voteResults === 'object') {
    const list = Array.isArray(voteResults.results) ? voteResults.results : null;

    if (list) {
      list.forEach(item => {
        const goatId = Number(item.goat_id ?? item.id ?? item.goatId);
        const votes = Number(item.votes ?? item.vote_count ?? item.count ?? 0);
        if (goatId) voteMap[goatId] = votes;
      });
    } else if (voteResults.counts && typeof voteResults.counts === 'object') {
      Object.entries(voteResults.counts).forEach(([key, value]) => {
        const goatId = Number(key);
        const votes = Number(value?.votes ?? value?.vote_count ?? value ?? 0);
        if (goatId) voteMap[goatId] = votes;
      });
    } else {
      Object.entries(voteResults).forEach(([key, value]) => {
        const goatId = Number(key);
        const votes = Number(value?.votes ?? value?.vote_count ?? value ?? 0);
        if (goatId) voteMap[goatId] = votes;
      });
    }
  }

  const enriched = goats.map(g => ({
    ...g,
    votes: Number(voteMap[g.id] || 0)
  }));

  const sorted = [...enriched].sort((a, b) => b.votes - a.votes || a.name.localeCompare(b.name, 'de'));
  const total = enriched.reduce((sum, g) => sum + g.votes, 0);
  const votedId = getVotedId();

  body.innerHTML = `
    ${buildWinnerCard(sorted, total)}

    ${total === 0
      ? `<p style="font-size:13px;color:var(--clr-text-muted);margin-bottom:16px">
           Noch keine Stimmen – stimme jetzt für deine Lieblingsziege ab!
         </p>`
      : ''}

    <p style="font-size:13px;color:var(--clr-text-muted);margin:0 0 16px">
      ${votedId === null
        ? 'Du kannst abstimmen und deine Wahl später auf diesem Gerät wieder ändern.'
        : 'Du hast bereits abgestimmt und kannst deine Stimme jederzeit auf diesem Gerät ändern.'}
    </p>

    <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--clr-text-faint);margin-bottom:12px">
      Abstimmungsergebnis · insgesamt ${total} Stimmen
    </div>

    <div id="vote-list">
      ${sorted.map(g => {
        const ph = g.foto
          ? `<img src="${g.foto}" style="width:28px;height:28px;object-fit:cover;border-radius:50%;flex-shrink:0" onerror="this.style.display='none'">`
          : `<span style="font-size:18px">${g.e}</span>`;
        const pct = total > 0 ? Math.round(g.votes / total * 100) : 0;
        return `<div class="vote-row">
          ${ph}
          <a href="/OhmoorZiegen/ziege.html?id=${g.id}" class="vote-row-name" style="color:var(--clr-text);text-decoration:none">${g.name}</a>
          <div class="vote-row-bar"><div class="vote-row-fill" style="width:${pct}%"></div></div>
          <span class="vote-row-count">♥ ${g.votes}</span>
          ${Number(votedId) === Number(g.id)
            ? `<button class="vote-btn" style="padding:5px 12px;font-size:12px" onclick="doVote(${g.id})">Deine Wahl</button>`
            : `<button class="vote-btn" style="padding:5px 12px;font-size:12px" onclick="doVote(${g.id})">${votedId === null ? 'Abstimmen' : 'Umvoten'}</button>`
          }
        </div>`;
      }).join('')}
    </div>`;
}

async function doVote(id) {
  try {
    await submitVote(id);
    await fetchCurrentVote();
    voteResults = await fetchVoteResults();
    render();
  } catch (err) {
    alert(err.message || 'Abstimmung fehlgeschlagen.');
  }
}

async function initPage() {
  try {
    goats = await getGoatsFromApi();
  } catch (err) {
    goats = getGoats();
  }

  try {
    await fetchCurrentVote();
  } catch (err) {
    // lokaler Fallback bleibt erhalten
  }

  try {
    voteResults = await fetchVoteResults();
  } catch (err) {
    voteResults = { total_votes: 0, counts: {} };
  }

  render();
}

initPage();
</script>
</body>
</html>
