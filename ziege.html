<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Schulziegen – Ziege</title>
<link rel="stylesheet" href="/OhmoorZiegen/style.css">
</head>
<body>

<div id="nav-root"></div>

<main class="app-main">
  <a class="detail-back" href="/OhmoorZiegen/index.html">← Zurück zur Übersicht</a>
  <div id="page-body"></div>
</main>

<script src="/OhmoorZiegen/data.js"></script>
<script src="/OhmoorZiegen/nav.js"></script>
<script>
buildNav('gallery');

// ID aus URL lesen
const params = new URLSearchParams(location.search);
const goatId = parseInt(params.get('id'));
let goats = [];
let goat = null;
let goatIdx = -1;

initPage();

async function initPage() {
  try {
    goats = await getGoatsFromApi();
  } catch (e) {
    console.error('API-Laden fehlgeschlagen, nutze lokalen Fallback.', e);
    goats = getGoats();
  }

  goat = goats.find(g => g.id === goatId);
  goatIdx = goats.findIndex(g => g.id === goatId);

  if (!goat) {
    document.getElementById('page-body').innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">🤷</span>
        <div class="empty-state-text">Ziege nicht gefunden</div>
        <a href="/OhmoorZiegen/index.html" class="btn-primary" style="margin-top:16px;display:inline-flex">Zur Galerie</a>
      </div>`;
    return;
  }

  document.title = `Schulziegen – ${goat.name}`;
  renderPage();
}

function renderPage() {
  const votedId = getVotedId();
  const voted   = votedId === goat.id;
  const hasVoted= votedId !== null;
  const isAdmin = isAdminLoggedIn();

  const prevGoat = goatIdx > 0 ? goats[goatIdx - 1] : null;
  const nextGoat = goatIdx < goats.length - 1 ? goats[goatIdx + 1] : null;

  // Hauptbild oben, Galerie zusätzlich darunter
  const hauptbildHtml = goat.foto
    ? `<div class="detail-photo" style="aspect-ratio:16/9;overflow:hidden">
         <img src="${goat.foto}" alt="${goat.name}"
              style="width:100%;height:100%;object-fit:cover"
              onerror="this.parentNode.innerHTML='<span style=\'font-size:7rem\'>${goat.e}</span>'">
       </div>`
    : `<div class="detail-photo"><span>${goat.e}</span></div>`;

  const galerieHtml = (goat.photos && goat.photos.length)
    ? `<div style="margin-top:12px">
         <div style="font-size:13px;color:var(--clr-text-muted);margin:0 0 8px 2px">Weitere Bilder</div>
         <div id="carousel-wrap" style="position:relative;width:100%;aspect-ratio:16/9;background:var(--clr-bg-subtle);overflow:hidden;border-radius:14px">
           <div id="ph-track" style="display:flex;width:100%;height:100%;transition:transform 0.3s ease">
             ${goat.photos.map(s => `<div style="min-width:100%;width:100%;height:100%;flex:0 0 100%"><img src="${s}" alt="${goat.name}" style="display:block;width:100%;height:100%;object-fit:cover"></div>`).join('')}
           </div>
           ${goat.photos.length > 1 ? `
             <button type="button" id="phl" onclick="phNav(-1)" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);z-index:5;width:40px;height:40px;border:none;border-radius:999px;background:rgba(0,0,0,0.45);color:#fff;font-size:24px;line-height:1;cursor:pointer">‹</button>
             <button type="button" id="phr" onclick="phNav(1)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);z-index:5;width:40px;height:40px;border:none;border-radius:999px;background:rgba(0,0,0,0.45);color:#fff;font-size:24px;line-height:1;cursor:pointer">›</button>
             <div id="ph-dots" style="position:absolute;left:50%;bottom:10px;transform:translateX(-50%);z-index:5;display:flex;gap:8px">
               ${goat.photos.map((_,i) => `<button type="button" class="ph-dot${i===0?' on':''}" onclick="phGo(${i})" style="width:10px;height:10px;border:none;border-radius:999px;background:${i===0 ? '#fff' : 'rgba(255,255,255,0.55)'};cursor:pointer"></button>`).join('')}
             </div>
           ` : ''}
         </div>
       </div>`
    : '';

  const photoHtml = hauptbildHtml + galerieHtml;

  document.getElementById('page-body').innerHTML = `
    <div class="detail-card">

      ${photoHtml}



      <div class="detail-body">
        <div class="detail-name">${goat.name}</div>
        <div class="detail-nick">${goat.nick}</div>

        <div class="detail-grid">
          <div>
            <div class="detail-field-label">Rasse</div>
            <div class="detail-field-value" id="f-breed">${goat.breed}</div>
          </div>
          <div>
            <div class="detail-field-label">Alter</div>
            <div class="detail-field-value" id="f-age">${goat.age}</div>
          </div>
          <div>
            <div class="detail-field-label">Charakter</div>
            <div class="detail-field-value" id="f-character">${goat.character}</div>
          </div>
          <div>
            <div class="detail-field-label">Lieblingsessen</div>
            <div class="detail-field-value" id="f-food">${goat.food}</div>
          </div>
          ${goat.mother ? `<div>
            <div class="detail-field-label">Mutter</div>
            <div class="detail-field-value">${goat.mother}</div>
          </div>` : ''}
          <div>
            <div class="detail-field-label">Besondere Fähigkeit</div>
            <div class="detail-field-value" id="f-skill">${goat.skill}</div>
          </div>
        </div>

        <div class="detail-story">
          <div class="detail-field-label">Geschichte</div>
          <div class="detail-field-value" id="f-story">${goat.story}</div>
        </div>


      </div>

      <div class="detail-nav">
        <button class="vote-btn${voted ? ' voted' : ''}" id="vote-btn"
          onclick="doVote()" ${hasVoted && !voted ? 'disabled' : ''}>
          ${voted ? '♥ Du hast gewählt' : '♡ Abstimmen'}
        </button>
        <span style="font-size:13px;color:var(--clr-text-muted)">${goat.votes > 0 ? `♡ ${goat.votes} Stimme${goat.votes !== 1 ? 'n' : ''}` : ''}</span>

        <div style="display:flex;gap:8px;margin-left:auto">
          ${prevGoat ? `<a class="modal-arrow" href="/OhmoorZiegen/ziege.html?id=${prevGoat.id}" title="${prevGoat.name}">‹</a>` : ''}
          ${nextGoat ? `<a class="modal-arrow" href="/OhmoorZiegen/ziege.html?id=${nextGoat.id}" title="${nextGoat.name}">›</a>` : ''}
        </div>
      </div>
    </div>`;

  // Foto-Navigation init
  phIdx = 0;
  if (goat.photos && goat.photos.length) {
    phUpdateDisplay();
  }
}

// ── Foto-Karussel ──
let phIdx = 0;

function phNav(dir) {
  phIdx = Math.max(0, Math.min((goat.photos || []).length - 1, phIdx + dir));
  phUpdateDisplay();
}

function phGo(i) { phIdx = i; phUpdateDisplay(); }

function phUpdateDisplay() {
  const track = document.getElementById('ph-track');
  if (track) track.style.transform = `translateX(-${phIdx * 100}%)`;
  updatePhNav();
  document.querySelectorAll('.ph-dot').forEach((d, i) => {
    d.classList.toggle('on', i === phIdx);
    d.style.background = i === phIdx ? '#fff' : 'rgba(255,255,255,0.55)';
  });
}

function updatePhNav() {
  const l = document.getElementById('phl');
  const r = document.getElementById('phr');
  if (l) {
    l.disabled = phIdx === 0;
    l.style.opacity = phIdx === 0 ? '0.45' : '1';
    l.style.cursor = phIdx === 0 ? 'default' : 'pointer';
  }
  if (r) {
    r.disabled = phIdx >= (goat.photos || []).length - 1;
    r.style.opacity = phIdx >= (goat.photos || []).length - 1 ? '0.45' : '1';
    r.style.cursor = phIdx >= (goat.photos || []).length - 1 ? 'default' : 'pointer';
  }
}

// ── Abstimmen ──
function doVote() {
  if (getVotedId() !== null) return;
  goat.votes++;
  setVotedId(goat.id);
  saveGoatData();
  document.getElementById('vote-btn').className = 'vote-btn voted';
  document.getElementById('vote-btn').textContent = '♥ Du hast gewählt';
  document.getElementById('vote-btn').disabled = true;
}
</script>
</body>
</html>
