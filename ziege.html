<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Schulziegen – Ziege</title>
<link rel="stylesheet" href="/OhmoorZiegen/style.css">
</head>
<body>

<div id="nav-root"></div>

<main class="app-main">
  <a class="detail-back" href="/OhmoorZiegen/index.html">← Zurück zur Übersicht</a>
  <div id="page-body"></div>
</main>

<script src="/OhmoorZiegen/data.js"></script>
<script src="/OhmoorZiegen/nav.js"></script>
<script>
buildNav('gallery');

// ID aus URL lesen
const params = new URLSearchParams(location.search);
const goatId = parseInt(params.get('id'));
let goats = [];
let goat = null;
let goatIdx = -1;

initPage();

async function initPage() {
  try {
    goats = await getGoatsFromApi();
  } catch (e) {
    console.error('API-Laden fehlgeschlagen, nutze lokalen Fallback.', e);
    goats = getGoats();
  }

  goat = goats.find(g => g.id === goatId);
  goatIdx = goats.findIndex(g => g.id === goatId);

  if (!goat) {
    document.getElementById('page-body').innerHTML = `
      <div class="empty-state">
        <span class="empty-state-icon">🤷</span>
        <div class="empty-state-text">Ziege nicht gefunden</div>
        <a href="/OhmoorZiegen/index.html" class="btn-primary" style="margin-top:16px;display:inline-flex">Zur Galerie</a>
      </div>`;
    return;
  }

  document.title = `Schulziegen – ${goat.name}`;
  renderPage();
}

function renderPage() {
  const votedId = getVotedId();
  const voted   = votedId === goat.id;
  const hasVoted= votedId !== null;
  const isAdmin = isAdminLoggedIn();

  const prevGoat = goatIdx > 0 ? goats[goatIdx - 1] : null;
  const nextGoat = goatIdx < goats.length - 1 ? goats[goatIdx + 1] : null;

  // Foto-Quelle ermitteln: hochgeladen → bilder/-Ordner → Emoji
  const hauptfoto = (goat.photos && goat.photos.length)
    ? goat.photos[0]
    : goat.foto || null;

  const photoHtml = (goat.photos && goat.photos.length)
    ? `<div id="carousel-wrap" style="position:relative;width:100%;aspect-ratio:16/9;background:var(--clr-bg-subtle);overflow:hidden">
        <div class="photo-track" id="ph-track">
          ${goat.photos.map(s => `<div class="photo-slide"><img src="${s}" alt="${goat.name}"></div>`).join('')}
        </div>
        ${goat.photos.length > 1 ? `
          <button class="ph-nav l" id="phl" onclick="phNav(-1)">‹</button>
          <button class="ph-nav r" id="phr" onclick="phNav(1)">›</button>
          <div class="ph-dots" id="ph-dots">${goat.photos.map((_,i) => `<button class="ph-dot${i===0?' on':''}" onclick="phGo(${i})"></button>`).join('')}</div>
        ` : ''}
      </div>`
    : goat.foto
      ? `<div class="detail-photo" style="aspect-ratio:16/9;overflow:hidden">
           <img src="${goat.foto}" alt="${goat.name}"
                style="width:100%;height:100%;object-fit:cover"
                onerror="this.parentNode.innerHTML='<span style=\'font-size:7rem\'>${goat.e}</span>'">
         </div>`
      : `<div class="detail-photo"><span>${goat.e}</span></div>`;

  document.getElementById('page-body').innerHTML = `
    <div class="detail-card">

      ${photoHtml}

      ${isAdmin ? `
      <div style="padding:10px 16px;background:var(--clr-bg-subtle);border-bottom:1px solid var(--clr-border-soft);display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--clr-text-muted)">🔐 Admin: Fotos verwalten</span>
        <input type="file" id="file-inp" accept="image/*" multiple style="display:none" onchange="handleUpload(event)">
        <button class="btn-secondary" style="font-size:12px;padding:5px 12px" onclick="document.getElementById('file-inp').click()">📷 Foto hochladen</button>
        ${goat.photos && goat.photos.length ? `<button class="btn-danger" style="font-size:12px;padding:5px 12px" onclick="deleteCurrentPhoto()">🗑️ Dieses Foto löschen</button>` : ''}
      </div>` : ''}

      <div class="detail-body">
        <div class="detail-name">${goat.name}</div>
        <div class="detail-nick">${goat.nick}</div>

        <div class="detail-grid">
          <div>
            <div class="detail-field-label">Rasse</div>
            <div class="detail-field-value" id="f-breed" ${isAdmin ? 'contenteditable="true" onblur="saveField(\'breed\',this)"' : ''}>${goat.breed}</div>
          </div>
          <div>
            <div class="detail-field-label">Alter</div>
            <div class="detail-field-value" id="f-age" ${isAdmin ? 'contenteditable="true" onblur="saveField(\'age\',this)"' : ''}>${goat.age}</div>
          </div>
          <div>
            <div class="detail-field-label">Charakter</div>
            <div class="detail-field-value" id="f-character" ${isAdmin ? 'contenteditable="true" onblur="saveField(\'character\',this)"' : ''}>${goat.character}</div>
          </div>
          <div>
            <div class="detail-field-label">Lieblingsessen</div>
            <div class="detail-field-value" id="f-food" ${isAdmin ? 'contenteditable="true" onblur="saveField(\'food\',this)"' : ''}>${goat.food}</div>
          </div>
          ${goat.mother ? `<div>
            <div class="detail-field-label">Mutter</div>
            <div class="detail-field-value">${goat.mother}</div>
          </div>` : ''}
          <div>
            <div class="detail-field-label">Besondere Fähigkeit</div>
            <div class="detail-field-value" id="f-skill" ${isAdmin ? 'contenteditable="true" onblur="saveField(\'skill\',this)"' : ''}>${goat.skill}</div>
          </div>
        </div>

        <div class="detail-story">
          <div class="detail-field-label">Geschichte</div>
          <div class="detail-field-value" id="f-story" ${isAdmin ? 'contenteditable="true" onblur="saveField(\'story\',this)"' : ''}>${goat.story}</div>
        </div>

        ${isAdmin ? `<div style="margin-top:12px;font-size:12px;color:var(--clr-blue)">✏️ Als Admin kannst du alle Texte direkt anklicken und bearbeiten.</div>` : ''}
      </div>

      <div class="detail-nav">
        <button class="vote-btn${voted ? ' voted' : ''}" id="vote-btn"
          onclick="doVote()" ${hasVoted && !voted ? 'disabled' : ''}>
          ${voted ? '♥ Du hast gewählt' : '♡ Abstimmen'}
        </button>
        <span style="font-size:13px;color:var(--clr-text-muted)">${goat.votes > 0 ? `♡ ${goat.votes} Stimme${goat.votes !== 1 ? 'n' : ''}` : ''}</span>

        <div style="display:flex;gap:8px;margin-left:auto">
          ${prevGoat ? `<a class="modal-arrow" href="/OhmoorZiegen/ziege.html?id=${prevGoat.id}" title="${prevGoat.name}">‹</a>` : ''}
          ${nextGoat ? `<a class="modal-arrow" href="/OhmoorZiegen/ziege.html?id=${nextGoat.id}" title="${nextGoat.name}">›</a>` : ''}
        </div>
      </div>
    </div>`;

  // Admin-Felder stylen
  if (isAdmin) {
    document.querySelectorAll('[contenteditable=true]').forEach(el => {
      el.style.cssText = 'border:1px solid var(--clr-border);border-radius:var(--radius-sm);padding:4px 6px;background:var(--clr-bg-subtle);cursor:text;outline:none';
      el.addEventListener('focus', () => el.style.borderColor = 'var(--clr-blue)');
      el.addEventListener('blur',  () => el.style.borderColor = 'var(--clr-border)');
    });
  }

  // Foto-Navigation init
  phIdx = 0;
  if (goat.photos && goat.photos.length) {
    phUpdateDisplay();
  }
}

// ── Foto-Karussel ──
let phIdx = 0;

function phNav(dir) {
  phIdx = Math.max(0, Math.min((goat.photos || []).length - 1, phIdx + dir));
  phUpdateDisplay();
}

function phGo(i) { phIdx = i; phUpdateDisplay(); }

function phUpdateDisplay() {
  const track = document.getElementById('ph-track');
  if (track) track.style.transform = `translateX(-${phIdx * 100}%)`;
  updatePhNav();
  document.querySelectorAll('.ph-dot').forEach((d, i) => {
    d.classList.toggle('on', i === phIdx);
    d.style.background = i === phIdx ? '#fff' : 'rgba(255,255,255,0.55)';
  });
}

function updatePhNav() {
  const l = document.getElementById('phl');
  const r = document.getElementById('phr');
  if (l) {
    l.disabled = phIdx === 0;
    l.style.opacity = phIdx === 0 ? '0.45' : '1';
    l.style.cursor = phIdx === 0 ? 'default' : 'pointer';
  }
  if (r) {
    r.disabled = phIdx >= (goat.photos || []).length - 1;
    r.style.opacity = phIdx >= (goat.photos || []).length - 1 ? '0.45' : '1';
    r.style.cursor = phIdx >= (goat.photos || []).length - 1 ? 'default' : 'pointer';
  }
}

// ── Foto hochladen (Admin) ──
function handleUpload(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  if (!goat.photos) goat.photos = [];
  let done = 0;
  files.forEach(file => {
    const r = new FileReader();
    r.onload = ev => {
      goat.photos.push(ev.target.result);
      done++;
      if (done === files.length) {
        saveGoatData();
        phIdx = goat.photos.length - 1;
        renderPage();
      }
    };
    r.readAsDataURL(file);
  });
  e.target.value = '';
}

function deleteCurrentPhoto() {
  if (!confirm('Dieses Foto löschen?')) return;
  goat.photos.splice(phIdx, 1);
  phIdx = Math.max(0, phIdx - 1);
  saveGoatData();
  renderPage();
}

// ── Felder speichern (Admin) ──
function saveField(field, el) {
  goat[field] = el.textContent.trim();
  saveGoatData();
}

function saveGoatData() {
  const allGoats = getGoats();
  const idx = allGoats.findIndex(g => g.id === goat.id);
  if (idx >= 0) allGoats[idx] = goat;
  saveGoats(allGoats);
}

// ── Abstimmen ──
function doVote() {
  if (getVotedId() !== null) return;
  goat.votes++;
  setVotedId(goat.id);
  saveGoatData();
  document.getElementById('vote-btn').className = 'vote-btn voted';
  document.getElementById('vote-btn').textContent = '♥ Du hast gewählt';
  document.getElementById('vote-btn').disabled = true;
}
</script>
</body>
</html>
